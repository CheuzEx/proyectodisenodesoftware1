<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Historial - Pacientes</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f6f9; margin: 0; }
        header { background: #1a56db; color: #fff; padding: 16px 24px; display: flex; align-items: center; gap: 10px; }
        header h2 { margin: 0; }
        main { padding: 24px; max-width: 960px; margin: 0 auto; }
        .toolbar { display: flex; gap: 12px; margin-bottom: 16px; }
        input[type="text"] { padding: 8px 12px; border-radius: 8px; border: 1px solid #cbd5e1; width: 280px; }
        button, .btn { padding: 8px 12px; border-radius: 8px; border: 1px solid #cbd5e1; background: #fff; cursor: pointer; }
        .btn { text-decoration: none; color: #111; }
        table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 12px; overflow: hidden; }
        th, td { padding: 12px 14px; border-bottom: 1px solid #eef2f7; }
        th { background: #e6f2fb; text-align: left; }
        a.link { color: #1a56db; text-decoration: none; font-weight: bold; }
        tr:hover { background: #f8fbff; }
        .muted { color: #6b7280; }
        .fab-home { position: fixed; right: 20px; bottom: 20px; background: #1a56db; color: #fff; border-radius: 999px; padding: 12px 16px; text-decoration: none; box-shadow: 0 6px 16px rgba(0,0,0,.15); z-index: 1000; }
    </style>
</head>
<body>
<header>
    <a class="btn" href="/">← Volver</a>
    <h2>Selecciona un paciente</h2>
</header>
<main>
    <div class="toolbar">
        <input type="text" id="searchInput" placeholder="Buscar por nombre o apellido" />
        <button onclick="buscar()">Buscar</button>
        <button onclick="limpiar()">Limpiar</button>
    </div>
    <table>
        <thead><tr><th>Nombre</th><th>Correo</th><th>Acción</th></tr></thead>
        <tbody id="tbody"><tr><td colspan="3" class="muted">Cargando…</td></tr></tbody>
    </table>
</main>
<a class="fab-home" href="/">Menú principal</a>

<script>
    // ── JWT helpers ────────────────────────────────────────────────
    function getToken() { return localStorage.getItem('jwt_token'); }

    function authHeaders() {
        const token = getToken();
        if (!token) { window.location.href = '/login.html'; return null; }
        return {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
        };
    }

    let todos = [];

    async function cargar() {
        const headers = authHeaders();
        if (!headers) return;
        try {
            const res = await fetch('/api/pacientes', { headers });
            if (res.status === 401 || res.status === 403) {
                window.location.href = '/login.html'; return;
            }
            if (!res.ok) throw new Error();
            todos = await res.json();
            renderizar(todos);
        } catch {
            document.getElementById('tbody').innerHTML =
                '<tr><td colspan="3" class="muted">No se pudieron cargar los pacientes.</td></tr>';
        }
    }

    function renderizar(lista) {
        const tbody = document.getElementById('tbody');
        if (!lista.length) {
            tbody.innerHTML = '<tr><td colspan="3" class="muted">No se encontraron pacientes.</td></tr>';
            return;
        }
        tbody.innerHTML = lista.map(p => `
            <tr>
                <td>${p.apellido || ''}${p.apellido && p.nombre ? ', ' : ''}${p.nombre || ''}</td>
                <td>${p.correo || '—'}</td>
                <td><a class="link" href="/historiales/${p.idPaciente}">Ver historial</a></td>
            </tr>
        `).join('');
    }

    function buscar() {
        const q = document.getElementById('searchInput').value.trim().toLowerCase();
        if (!q) { renderizar(todos); return; }
        renderizar(todos.filter(p =>
            (p.nombre || '').toLowerCase().includes(q) ||
            (p.apellido || '').toLowerCase().includes(q)
        ));
    }

    function limpiar() {
        document.getElementById('searchInput').value = '';
        renderizar(todos);
    }

    document.getElementById('searchInput').addEventListener('keydown', e => {
        if (e.key === 'Enter') buscar();
    });

    cargar();
</script>
</body>
</html>
