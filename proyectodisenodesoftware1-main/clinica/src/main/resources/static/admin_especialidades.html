<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gestion de Especialidades</title>
  <style>
    :root { --primary: #1a56db; --bg: #f4f6f9; --card: #ffffff; --border: #d1d5db; --text: #111827; --muted: #6b7280; --danger: #dc2626; }
    * { box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: var(--bg); margin: 0; color: var(--text); }
    header { background: var(--primary); color: #fff; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; }
    header h1 { margin: 0; font-size: 1.1rem; }
    .btn-back { color: #fff; text-decoration: none; font-size: .9rem; border: 1px solid rgba(255,255,255,.4); padding: 6px 12px; border-radius: 8px; }

    main { max-width: 800px; margin: 28px auto; padding: 0 24px; display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    @media(max-width:600px){ main { grid-template-columns: 1fr; } }

    .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 20px; }
    .card-title { font-size: 1rem; font-weight: bold; margin: 0 0 16px; }

    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 10px 12px; border-bottom: 1px solid #e5e7eb; text-align: left; font-size: .9rem; }
    th { background: #f0f4ff; font-weight: bold; }
    tr:hover td { background: #f8f9ff; }

    .btn { padding: 8px 14px; border-radius: 8px; border: none; cursor: pointer; font-size: .9rem; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-danger  { background: var(--danger);  color: #fff; }
    .btn-outline { background: #fff; border: 1px solid var(--border); color: var(--text); }
    .btn-sm { padding: 5px 10px; font-size: .8rem; }

    label { display: block; font-size: .85rem; font-weight: bold; margin: 10px 0 3px; }
    input[type="text"] { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px; font-size: .9rem; }
    input:focus { outline: none; border-color: var(--primary); }

    .alert { padding: 10px 12px; border-radius: 8px; font-size: .88rem; margin-bottom: 12px; display: none; }
    .alert.ok  { background: #dcfce7; color: #166534; }
    .alert.err { background: #fee2e2; color: var(--danger); }
    .muted { color: var(--muted); font-size: .88rem; }

    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); display: none; align-items: center; justify-content: center; z-index: 100; }
    .overlay.open { display: flex; }
    .modal { background: #fff; border-radius: 10px; padding: 24px; max-width: 400px; width: 92%; }
    .modal h3 { margin: 0 0 12px; font-size: 1rem; }
    .modal p  { margin: 0 0 16px; font-size: .9rem; color: var(--muted); }
    .modal-actions { display: flex; justify-content: flex-end; gap: 8px; }
  </style>
</head>
<body>

<header>
  <h1>Gestion de Especialidades</h1>
  <a class="btn-back" href="/">Volver al menu</a>
</header>

<main>
  <!-- Lista -->
  <div class="card">
    <p class="card-title">Especialidades registradas</p>
    <div id="alertGlobal" class="alert"></div>
    <table>
      <thead><tr><th>ID</th><th>Nombre</th><th>Acciones</th></tr></thead>
      <tbody id="tbody"><tr><td colspan="3" class="muted">Cargando...</td></tr></tbody>
    </table>
  </div>

  <!-- Panel crear/editar -->
  <div class="card">
    <p class="card-title" id="panelTitulo">Nueva especialidad</p>
    <div id="alertForm" class="alert"></div>
    <label>Nombre</label>
    <input type="text" id="f_nombre" placeholder="Ej. Cardiologia" />
    <div style="display:flex; gap:8px; margin-top:16px;">
      <button class="btn btn-primary" onclick="guardar()">Guardar</button>
      <button class="btn btn-outline" id="btnCancelar" onclick="modoCrear()" style="display:none">Cancelar</button>
    </div>
  </div>
</main>

<!-- Modal eliminar -->
<div class="overlay" id="modalEliminar">
  <div class="modal">
    <h3>Confirmar eliminacion</h3>
    <p id="modalTexto">¿Seguro que deseas eliminar esta especialidad?</p>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="cerrarModal()">Cancelar</button>
      <button class="btn btn-danger" onclick="confirmarEliminar()">Eliminar</button>
    </div>
  </div>
</div>

<script>
// ── Auth ────────────────────────────────────────────────────────
function getToken(){ return localStorage.getItem('jwt_token'); }
function authHeaders(){
  const t = getToken();
  if(!t){ location.href='/login.html'; return null; }
  return { 'Content-Type':'application/json', 'Authorization':`Bearer ${t}` };
}
function checkAuth(res){ if(res.status===401||res.status===403){ location.href='/login.html'; return false; } return true; }

// ── Estado ──────────────────────────────────────────────────────
let modoEdicion = false;
let editId = null;
let pendingDeleteId = null;

// ── Cargar ───────────────────────────────────────────────────────
async function cargar(){
  const h = authHeaders(); if(!h) return;
  try{
    const res = await fetch('/api/especialidades', {headers:h});
    if(!checkAuth(res)) return;
    if(!res.ok) throw new Error();
    const lista = await res.json();
    renderTabla(lista);
  } catch {
    mostrarAlertaGlobal('err', 'No se pudieron cargar las especialidades.');
  }
}

function renderTabla(lista){
  const tbody = document.getElementById('tbody');
  if(!lista.length){
    tbody.innerHTML = '<tr><td colspan="3" class="muted">No hay especialidades registradas.</td></tr>';
    return;
  }
  tbody.innerHTML = lista.map(e => {
    const id     = e.idEspecialidad ?? e.id;
    const nombre = e.nomEspecialidad ?? e.nombre ?? '—';
    return `
      <tr>
        <td>${id}</td>
        <td>${nombre}</td>
        <td>
          <button class="btn btn-outline btn-sm" onclick="abrirEditar(${id}, '${nombre}')">Editar</button>
          <button class="btn btn-danger btn-sm" onclick="abrirModalEliminar(${id}, '${nombre}')">Eliminar</button>
        </td>
      </tr>
    `;
  }).join('');
}

// ── Crear / Editar ───────────────────────────────────────────────
function modoCrear(){
  modoEdicion = false; editId = null;
  document.getElementById('panelTitulo').textContent = 'Nueva especialidad';
  document.getElementById('f_nombre').value = '';
  document.getElementById('btnCancelar').style.display = 'none';
  ocultarAlertaForm();
}

function abrirEditar(id, nombre){
  modoEdicion = true; editId = id;
  document.getElementById('panelTitulo').textContent = `Editar: ${nombre}`;
  document.getElementById('f_nombre').value = nombre;
  document.getElementById('btnCancelar').style.display = 'inline-block';
  document.getElementById('f_nombre').focus();
  ocultarAlertaForm();
}

async function guardar(){
  const h = authHeaders(); if(!h) return;
  const nombre = document.getElementById('f_nombre').value.trim();
  if(!nombre){ mostrarAlertaForm('err', 'El nombre es obligatorio.'); return; }

  const url    = modoEdicion ? `/api/especialidades/${editId}` : '/api/especialidades';
  const method = modoEdicion ? 'PUT' : 'POST';

  try{
    const res = await fetch(url, {method, headers:h, body:JSON.stringify({nombre})});
    if(!checkAuth(res)) return;
    if(res.status===409){ mostrarAlertaForm('err', 'Ya existe una especialidad con ese nombre.'); return; }
    if(!res.ok) throw new Error(await res.text());
    mostrarAlertaGlobal('ok', modoEdicion ? 'Especialidad actualizada.' : 'Especialidad creada.');
    modoCrear();
    await cargar();
  } catch(err){
    mostrarAlertaForm('err', err.message || 'No se pudo guardar.');
  }
}

// ── Eliminar ────────────────────────────────────────────────────
function abrirModalEliminar(id, nombre){
  pendingDeleteId = id;
  document.getElementById('modalTexto').textContent =
    `¿Seguro que deseas eliminar "${nombre}"? Los doctores que la tengan asignada perderan esta especialidad.`;
  document.getElementById('modalEliminar').classList.add('open');
}

function cerrarModal(){
  document.getElementById('modalEliminar').classList.remove('open');
  pendingDeleteId = null;
}

async function confirmarEliminar(){
  if(!pendingDeleteId) return;
  const h = authHeaders(); if(!h) return;
  try{
    const res = await fetch(`/api/especialidades/${pendingDeleteId}`, {method:'DELETE', headers:h});
    if(!checkAuth(res)) return;
    if(!res.ok) throw new Error();
    cerrarModal();
    mostrarAlertaGlobal('ok', 'Especialidad eliminada.');
    await cargar();
  } catch {
    cerrarModal();
    mostrarAlertaGlobal('err', 'No se pudo eliminar. Puede estar en uso.');
  }
}

document.getElementById('modalEliminar').addEventListener('click', (e) => {
  if(e.target === document.getElementById('modalEliminar')) cerrarModal();
});

// Guardar con Enter
document.getElementById('f_nombre').addEventListener('keydown', (e) => {
  if(e.key === 'Enter') guardar();
});

// ── Helpers ──────────────────────────────────────────────────────
function mostrarAlertaGlobal(tipo, msg){
  const el = document.getElementById('alertGlobal');
  el.className = `alert ${tipo}`; el.textContent = msg; el.style.display = 'block';
  setTimeout(() => el.style.display='none', 3500);
}
function mostrarAlertaForm(tipo, msg){
  const el = document.getElementById('alertForm');
  el.className = `alert ${tipo}`; el.textContent = msg; el.style.display = 'block';
}
function ocultarAlertaForm(){ document.getElementById('alertForm').style.display='none'; }

// ── Init ─────────────────────────────────────────────────────────
cargar();
</script>
</body>
</html>
