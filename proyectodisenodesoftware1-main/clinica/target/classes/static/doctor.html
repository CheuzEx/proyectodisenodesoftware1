<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Perfil del Doctor</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f6f9; margin: 0; }
        header { background: #1a56db; color: #fff; text-align: center; padding: 16px; }
        .wrap { max-width: 800px; margin: 24px auto; background: #fff; padding: 24px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,.1); }
        a.btn { display: inline-block; margin-right: 10px; text-decoration: none; background: #1a56db; color: #fff; padding: 8px 12px; border-radius: 8px; }
        a.btn.gris { background: #6c757d; }
        .muted { color: #6b7280; }
        ul { padding-left: 20px; }
        .fab-home {
            position: fixed; right: 20px; bottom: 20px;
            background: #1a56db; color: #fff; border-radius: 999px;
            padding: 12px 16px; text-decoration: none;
            box-shadow: 0 6px 16px rgba(0,0,0,.15); z-index: 1000;
        }
    </style>
</head>
<body>
<header>
    <h1 id="titulo">Perfil del Doctor</h1>
</header>
<div class="wrap" id="contenido">
    <p class="muted">Cargando…</p>
</div>
<a class="fab-home" href="/">Menú principal</a>

<script>
    // ── JWT helpers ────────────────────────────────────────────────
    function getToken() {
        return localStorage.getItem('jwt_token');
    }

    function authHeaders() {
        const token = getToken();
        if (!token) {
            window.location.href = '/login.html';
            return null;
        }
        return {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
        };
    }

    // ── Carga el perfil del doctor ─────────────────────────────────
    // Si la URL tiene /doctor/5 usa ese ID; si es /doctor usa /api/doctores/me
    const segmentos = location.pathname.split('/').filter(Boolean);
    const idEnUrl   = segmentos[1];
    const endpoint  = (idEnUrl && !isNaN(idEnUrl))
        ? `/api/doctores/${idEnUrl}`
        : '/api/doctores/me';

    (async () => {
        const headers = authHeaders();
        if (!headers) return;
        try {
            const res = await fetch(endpoint, { headers });
            if (res.status === 401 || res.status === 403) {
                window.location.href = '/login.html';
                return;
            }
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const d = await res.json();

            document.getElementById('titulo').textContent =
                `Dr. ${d.nombre || ''} ${d.apellido || ''}`.trim();

            const especialidades = Array.isArray(d.especialidades) && d.especialidades.length
                ? d.especialidades.map(e => `<li>${e.nomEspecialidad || e.nombre || '—'}</li>`).join('')
                : '<li class="muted">Sin especialidades</li>';

            document.getElementById('contenido').innerHTML = `
                <p><b>Nombre:</b> ${d.nombre || '—'} ${d.apellido || ''}</p>
                <p><b>Teléfono:</b> ${d.telefono || '—'}</p>
                <p><b>Dirección:</b> ${d.direccion || '—'}</p>
                <h3>Especialidades</h3>
                <ul>${especialidades}</ul>
                <div style="margin-top:16px">
                    <a class="btn" href="/doctor/editar/${d.idDoctor}">Editar perfil</a>
                    <a class="btn gris" href="/">Volver</a>
                </div>
            `;
        } catch (e) {
            document.getElementById('contenido').innerHTML =
                '<p class="muted">No se pudo cargar el perfil del doctor.</p>';
        }
    })();
</script>
</body>
</html>
