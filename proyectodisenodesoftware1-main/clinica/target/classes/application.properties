# ── Base de datos ──────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/clinica_DB}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:86907665}

# ── JPA / Hibernate ────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.default_schema=clinica
spring.jpa.show-sql=false
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# ── Servidor ───────────────────────────────────────────────────────────────────
server.port=8081

# ── JWT ────────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:clave-super-secreta-para-desarrollo-local-minimo-32-chars}
jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}
